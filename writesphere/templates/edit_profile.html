{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Edit Profile — WriteSphere</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-form-side">
      <div class="auth-form-inner">
        <h2>Edit Profile</h2>

        <form method="POST" action="{% url 'edit_profile' %}" enctype="multipart/form-data">
          {% csrf_token %}

          <div class="form-group">
            <label>First Name</label>
            <input type="text" class="form-input" name="fname" value="{{ user.fname }}" required>
          </div>

          <div class="form-group">
            <label>Last Name</label>
            <input type="text" class="form-input" name="lname" value="{{ user.lname }}" required>
          </div>

          <div class="form-group">
            <label>Bio</label>
            <textarea class="form-input" name="bio" rows="3" placeholder="Apne baare mein likho...">{{ user.bio }}</textarea>
          </div>

          <div class="form-group">
            <label>Profile Photo</label>
            <input type="file" class="form-input" name="profile_photo" accept="image/*">
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;">
            Save Changes
          </button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
